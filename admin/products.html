<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products Admin — StEEG</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a href="../" class="admin-nav-brand"><span class="brand-steeg">StEEG</span> Admin</a>
  <div class="admin-nav-links">
    <a href="./" class="admin-nav-link">Dashboard</a>
    <a href="./products.html" class="admin-nav-link active">Products</a>
    <a href="./orders.html" class="admin-nav-link">Orders</a>
    <a href="./downloads.html" class="admin-nav-link">Downloads</a>
    <a href="./settings.html" class="admin-nav-link">Settings</a>
    <a href="../" class="admin-nav-link">← Site</a>
    <button id="admin-logout" class="btn btn-sm">Logout</button>
  </div>
</nav>

<main class="admin-main">
  <div class="admin-header-row">
    <h1 class="admin-page-title">Products</h1>
    <button class="btn btn-primary" id="btn-new-product">+ New Product</button>
  </div>

  <div id="product-list"><p>Loading…</p></div>
</main>

<!-- Product Modal -->
<div class="modal-overlay" id="product-modal" style="display:none">
  <div class="modal-box modal-wide">
    <button class="modal-close" id="modal-close">✕</button>
    <h2 id="modal-title">Product</h2>
    <form id="product-form" class="admin-form">
      <div class="form-row">
        <div class="form-group">
          <label>Slug *</label>
          <input type="text" name="slug" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Model ID</label>
          <input type="text" name="model_id" class="form-input">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Name ZH *</label>
          <input type="text" name="name_zh" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Name EN *</label>
          <input type="text" name="name_en" class="form-input" required>
        </div>
      </div>
      <div class="form-group">
        <label>Description ZH</label>
        <textarea name="description_zh" class="form-input" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Description EN</label>
        <textarea name="description_en" class="form-input" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select name="category_id" class="form-input" id="cat-select"></select>
        </div>
        <div class="form-group">
          <label>Currency</label>
          <select name="currency" class="form-input">
            <option value="USD">USD</option>
            <option value="TWD">TWD</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price</label>
          <input type="number" name="price" class="form-input" min="0" step="0.01" value="0">
        </div>
        <div class="form-group">
          <label>Sort Order</label>
          <input type="number" name="sort_order" class="form-input" value="0">
        </div>
      </div>
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" name="show_price" value="1"> Show Price (uncheck = 洽詢代理商)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="in_stock" value="1" checked> In Stock
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="featured" value="1"> Featured
        </label>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <div class="image-upload-row">
          <input type="text" name="image_url" id="img-url" class="form-input" placeholder="/uploads/...">
          <label class="btn btn-outline btn-sm" for="img-file-input">Upload</label>
          <input type="file" id="img-file-input" accept="image/*" style="display:none">
        </div>
        <img id="img-preview" style="max-height:80px;margin-top:8px;display:none">
      </div>
      <div class="form-group">
        <label>Specs JSON <small>(array of {key, value})</small></label>
        <textarea name="specs_json" class="form-input" rows="4" placeholder='[{"key":"Channels","value":"8"}]'></textarea>
      </div>
      <div class="form-footer">
        <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="form-save">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
(function () {
  'use strict';

  let categories = [];
  let editingId = null;

  async function checkAdmin() {
    const token = API.token();
    if (!token) { window.location.href = '/login.html?next=/admin/products.html'; return false; }
    try {
      const user = await API.get('/auth/me');
      if (user.role !== 'admin') { window.location.href = '/'; return false; }
      return true;
    } catch { window.location.href = '/login.html'; return false; }
  }

  async function loadCategories() {
    categories = await API.get('/admin/categories');
    const sel = document.getElementById('cat-select');
    sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name_zh} / ${c.name_en}</option>`).join('');
  }

  async function loadProducts() {
    const list = document.getElementById('product-list');
    try {
      const products = await API.get('/admin/products');
      list.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>ID</th><th>Slug</th><th>Name ZH</th><th>Category</th><th>Price</th><th>Featured</th><th>Actions</th></tr></thead>
          <tbody>${products.map(p => `
            <tr>
              <td>${p.id}</td>
              <td>${p.slug}</td>
              <td>${p.name_zh}</td>
              <td>${p.cat_zh || '—'}</td>
              <td>${p.show_price ? (p.currency + ' ' + p.price) : '洽詢'}</td>
              <td>${p.featured ? '★' : ''}</td>
              <td>
                <button class="btn btn-sm btn-edit" data-id="${p.id}">Edit</button>
                <button class="btn btn-sm btn-danger btn-delete" data-id="${p.id}">Delete</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;

      list.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', () => openEdit(parseInt(btn.dataset.id), products));
      });
      list.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this product?')) return;
          await API.del('/admin/products/' + btn.dataset.id);
          loadProducts();
        });
      });
    } catch (e) {
      list.innerHTML = '<p class="error-msg">' + e.message + '</p>';
    }
  }

  function openEdit(id, products) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Product';
    const form = document.getElementById('product-form');
    const fields = ['slug','model_id','name_zh','name_en','description_zh','description_en','price','sort_order','image_url','specs_json','currency'];
    fields.forEach(f => {
      const el = form.querySelector(`[name="${f}"]`);
      if (el) el.value = p[f] ?? '';
    });
    form.querySelector('[name="category_id"]').value = p.category_id || '';
    form.querySelector('[name="show_price"]').checked = !!p.show_price;
    form.querySelector('[name="in_stock"]').checked = !!p.in_stock;
    form.querySelector('[name="featured"]').checked = !!p.featured;
    updateImgPreview(p.image_url);
    openModal();
  }

  function openNew() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'New Product';
    document.getElementById('product-form').reset();
    updateImgPreview('');
    openModal();
  }

  function openModal() {
    document.getElementById('product-modal').style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('product-modal').style.display = 'none';
  }

  function updateImgPreview(url) {
    const img = document.getElementById('img-preview');
    if (url) { img.src = url; img.style.display = ''; }
    else { img.style.display = 'none'; }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    if (!await checkAdmin()) return;
    await loadCategories();
    await loadProducts();

    document.getElementById('admin-logout').addEventListener('click', () => APP.logout());
    document.getElementById('btn-new-product').addEventListener('click', openNew);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('product-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    // Image upload
    document.getElementById('img-file-input').addEventListener('change', async function () {
      if (!this.files[0]) return;
      const fd = new FormData();
      fd.append('image', this.files[0]);
      try {
        const res = await API.upload('/admin/upload-image', fd);
        document.getElementById('img-url').value = res.url;
        updateImgPreview(res.url);
      } catch (e) { alert('Upload failed: ' + e.message); }
    });

    document.getElementById('img-url').addEventListener('input', function () {
      updateImgPreview(this.value);
    });

    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        slug: form.slug.value,
        model_id: form.model_id.value,
        name_zh: form.name_zh.value,
        name_en: form.name_en.value,
        description_zh: form.description_zh.value,
        description_en: form.description_en.value,
        category_id: parseInt(form.category_id.value),
        currency: form.currency.value,
        price: parseFloat(form.price.value) || 0,
        sort_order: parseInt(form.sort_order.value) || 0,
        show_price: form.show_price.checked,
        in_stock: form.in_stock.checked,
        featured: form.featured.checked,
        image_url: form.image_url.value,
        specs_json: form.specs_json.value || '[]',
      };
      try {
        if (editingId) {
          await API.put('/admin/products/' + editingId, data);
        } else {
          await API.post('/admin/products', data);
        }
        closeModal();
        loadProducts();
      } catch (err) { alert('Save failed: ' + err.message); }
    });
  });
})();
</script>
</body>
</html>
