<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — StEEG</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a href="../" class="admin-nav-brand"><span class="brand-steeg">StEEG</span> Admin</a>
  <div class="admin-nav-links">
    <a href="./" class="admin-nav-link active">Dashboard</a>
    <a href="./products.html" class="admin-nav-link">Products</a>
    <a href="./orders.html" class="admin-nav-link">Orders</a>
    <a href="./downloads.html" class="admin-nav-link">Downloads</a>
    <a href="./settings.html" class="admin-nav-link">Settings</a>
    <a href="../" class="admin-nav-link">← Site</a>
    <button id="admin-logout" class="btn btn-sm">Logout</button>
  </div>
</nav>

<main class="admin-main">
  <h1 class="admin-page-title">Dashboard</h1>
  <div class="admin-stats-row" id="admin-stats">
    <div class="admin-stat-card"><div class="admin-stat-num" id="stat-products">—</div><div>Products</div></div>
    <div class="admin-stat-card"><div class="admin-stat-num" id="stat-orders">—</div><div>Orders</div></div>
    <div class="admin-stat-card"><div class="admin-stat-num" id="stat-users">—</div><div>Members</div></div>
    <div class="admin-stat-card"><div class="admin-stat-num" id="stat-pending">—</div><div>Pending Orders</div></div>
  </div>

  <h2>Recent Orders</h2>
  <div id="recent-orders"><p>Loading…</p></div>
</main>

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
(function () {
  'use strict';

  async function checkAdmin() {
    const token = API.token();
    if (!token) { window.location.href = '/login.html?next=/admin/'; return; }
    try {
      const user = await API.get('/auth/me');
      if (user.role !== 'admin') { window.location.href = '/'; return; }
    } catch { window.location.href = '/login.html?next=/admin/'; }
  }

  async function loadDashboard() {
    try {
      const [products, orders, users] = await Promise.all([
        API.get('/admin/products'),
        API.get('/admin/orders'),
        API.get('/admin/users'),
      ]);
      document.getElementById('stat-products').textContent = products.length;
      document.getElementById('stat-orders').textContent = orders.length;
      document.getElementById('stat-users').textContent = users.length;
      const pending = orders.filter(o => o.status === 'pending').length;
      document.getElementById('stat-pending').textContent = pending;

      const recent = orders.slice(0, 10);
      document.getElementById('recent-orders').innerHTML = `
        <table class="admin-table">
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Type</th><th>Status</th><th>Total</th><th>Date</th></tr></thead>
          <tbody>${recent.map(o => `
            <tr>
              <td>#${o.id}</td>
              <td>${o.guest_name || o.user_email || '—'}</td>
              <td>${o.guest_email || o.user_email || '—'}</td>
              <td><span class="badge badge-${o.type}">${o.type}</span></td>
              <td><span class="badge badge-${o.status}">${o.status}</span></td>
              <td>${o.total ? 'USD ' + o.total.toLocaleString() : '—'}</td>
              <td>${o.created_at?.slice(0,10) || ''}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch (e) {
      document.getElementById('recent-orders').innerHTML = '<p class="error-msg">' + e.message + '</p>';
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await checkAdmin();
    loadDashboard();
    document.getElementById('admin-logout').addEventListener('click', () => APP.logout());
  });
})();
</script>
</body>
</html>
