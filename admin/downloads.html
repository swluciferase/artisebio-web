<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads Admin — StEEG</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

<nav class="admin-nav">
  <a href="../" class="admin-nav-brand"><span class="brand-steeg">StEEG</span> Admin</a>
  <div class="admin-nav-links">
    <a href="./" class="admin-nav-link">Dashboard</a>
    <a href="./products.html" class="admin-nav-link">Products</a>
    <a href="./orders.html" class="admin-nav-link">Orders</a>
    <a href="./downloads.html" class="admin-nav-link active">Downloads</a>
    <a href="./settings.html" class="admin-nav-link">Settings</a>
    <a href="../" class="admin-nav-link">← Site</a>
    <button id="admin-logout" class="btn btn-sm">Logout</button>
  </div>
</nav>

<main class="admin-main">
  <div class="admin-header-row">
    <h1 class="admin-page-title">Downloads</h1>
    <button class="btn btn-primary" id="btn-new-dl">+ New Download</button>
  </div>
  <div id="dl-list"><p>Loading…</p></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="dl-modal" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <h2 id="modal-title">Download</h2>
    <form id="dl-form" class="admin-form" enctype="multipart/form-data">
      <div class="form-row">
        <div class="form-group">
          <label>Name ZH *</label>
          <input type="text" name="name_zh" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Name EN *</label>
          <input type="text" name="name_en" class="form-input" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select name="category" class="form-input">
            <option value="software">Software</option>
            <option value="firmware">Firmware</option>
            <option value="manual">Manual</option>
            <option value="driver">Driver</option>
          </select>
        </div>
        <div class="form-group">
          <label>Version</label>
          <input type="text" name="version" class="form-input" placeholder="1.0.0">
        </div>
      </div>
      <div class="form-group">
        <label>Description ZH</label>
        <textarea name="description_zh" class="form-input" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>Description EN</label>
        <textarea name="description_en" class="form-input" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>File</label>
        <input type="file" name="file" id="dl-file" class="form-input">
        <small id="current-file"></small>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Sort Order</label>
          <input type="number" name="sort_order" class="form-input" value="0">
        </div>
        <label class="checkbox-label" style="align-self:center">
          <input type="checkbox" name="requires_login" value="1"> Requires Login
        </label>
      </div>
      <div class="form-footer">
        <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
(function () {
  'use strict';

  let editingId = null;

  async function checkAdmin() {
    const token = API.token();
    if (!token) { window.location.href = '/login.html'; return false; }
    try {
      const user = await API.get('/auth/me');
      if (user.role !== 'admin') { window.location.href = '/'; return false; }
      return true;
    } catch { window.location.href = '/login.html'; return false; }
  }

  async function loadList() {
    const list = document.getElementById('dl-list');
    try {
      const items = await API.get('/admin/downloads');
      list.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>ID</th><th>Name ZH</th><th>Category</th><th>Version</th><th>Filename</th><th>Login?</th><th>Actions</th></tr></thead>
          <tbody>${items.map(d => `
            <tr>
              <td>${d.id}</td>
              <td>${d.name_zh}</td>
              <td>${d.category}</td>
              <td>${d.version || '—'}</td>
              <td>${d.filename}</td>
              <td>${d.requires_login ? '🔒' : ''}</td>
              <td>
                <button class="btn btn-sm btn-edit" data-id="${d.id}">Edit</button>
                <button class="btn btn-sm btn-danger btn-delete" data-id="${d.id}">Delete</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;

      list.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', () => openEdit(parseInt(btn.dataset.id), items));
      });
      list.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete?')) return;
          await API.del('/admin/downloads/' + btn.dataset.id);
          loadList();
        });
      });
    } catch (e) { list.innerHTML = '<p class="error-msg">' + e.message + '</p>'; }
  }

  function openEdit(id, items) {
    const d = items.find(x => x.id === id);
    if (!d) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Download';
    const form = document.getElementById('dl-form');
    ['name_zh','name_en','description_zh','description_en','version','sort_order'].forEach(f => {
      const el = form.querySelector(`[name="${f}"]`);
      if (el) el.value = d[f] ?? '';
    });
    form.querySelector('[name="category"]').value = d.category;
    form.querySelector('[name="requires_login"]').checked = !!d.requires_login;
    document.getElementById('current-file').textContent = d.filename ? 'Current: ' + d.filename : '';
    openModal();
  }

  function openNew() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'New Download';
    document.getElementById('dl-form').reset();
    document.getElementById('current-file').textContent = '';
    openModal();
  }

  function openModal() { document.getElementById('dl-modal').style.display = 'flex'; }
  function closeModal() { document.getElementById('dl-modal').style.display = 'none'; }

  document.addEventListener('DOMContentLoaded', async () => {
    if (!await checkAdmin()) return;
    loadList();
    document.getElementById('admin-logout').addEventListener('click', () => APP.logout());
    document.getElementById('btn-new-dl').addEventListener('click', openNew);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('dl-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.getElementById('dl-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const fd = new FormData(form);

      try {
        if (editingId) {
          // PUT (no file re-upload in edit mode — keep existing filename)
          const data = {
            name_zh: fd.get('name_zh'),
            name_en: fd.get('name_en'),
            description_zh: fd.get('description_zh'),
            description_en: fd.get('description_en'),
            category: fd.get('category'),
            version: fd.get('version'),
            sort_order: parseInt(fd.get('sort_order')) || 0,
            requires_login: form.querySelector('[name="requires_login"]').checked,
          };
          await API.put('/admin/downloads/' + editingId, data);
        } else {
          await API.upload('/admin/downloads', fd);
        }
        closeModal();
        loadList();
      } catch (err) { alert('Save failed: ' + err.message); }
    });
  });
})();
</script>
</body>
</html>
