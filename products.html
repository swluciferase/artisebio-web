<body>

<!-- NAV -->

        <span data-i18n="nav_cart"></span>
        <span class="cart-badge" style="display:none">0</span>

      <div id="nav-auth"></div>
      <a href="admin/" class="nav-link nav-admin" id="nav-admin-link" style="display:none" data-i18n="nav_admin"></a>
      <button id="lang-toggle" class="lang-toggle">EN</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1 data-i18n="nav_products"></h1>
  </div>
</div>

<!-- Product detail modal overlay -->
<div class="modal-overlay" id="product-modal" style="display:none">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- PRODUCTS PAGE -->
<main class="section">
  <div class="container">
    <!-- Category tabs -->
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-tab active" data-cat="" data-i18n="cat_all"></button>
    </div>

    <!-- Grid -->
    <div class="product-grid" id="product-grid">
      <div class="loading-placeholder" data-i18n="loading"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <img src="images/artise-logo.png" alt="Artise Biomedical" style="height:28px;width:auto;filter:brightness(0) invert(1);opacity:.8">
      <span class="footer-company" data-lang="zh">亞堤仕生醫科技股份有限公司</span>
      <span class="footer-company" data-lang="en">Artise Biomedical Co., Ltd.</span>
    </div>
    <div class="footer-contact">
      <a href="mailto:sales@artisebio.com">sales@artisebio.com</a>
      <a href="tel:+886229088658">+886-2-2908-8658</a>
    </div>
    <div class="footer-copy" data-i18n="footer_rights"></div>
  </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
(function () {
  'use strict';

  // ── Static product data (demo mode — no backend) ──────────────
  const STATIC_CATEGORIES = [
    { slug: 'eeg-devices', name_zh: 'EEG 裝置', name_en: 'EEG Devices' },
    { slug: 'software',    name_zh: '軟體',     name_en: 'Software' },
    { slug: 'accessories', name_zh: '配件',     name_en: 'Accessories' },
  ];

  const STATIC_PRODUCTS = [
    {
      id:1, slug:'altair', model_id:'Altair', cat_slug:'eeg-devices', in_stock:true, show_price:false, price:0, currency:'TWD',
      name_zh:'Altair — 8 通道乾式無線 EEG', name_en:'Altair — 8-Channel Dry Wireless EEG',
      description_zh:'免備皮電極，穿戴即測。1000 Hz 高速採樣，藍牙傳輸，適合移動場景與日常腦健康監測。',
      description_en:'No-prep dry electrodes, wearable and instant. 1000 Hz sampling, Bluetooth transmission — ideal for mobile scenarios and daily brain health monitoring.',
      specs_json: JSON.stringify([{key:'通道數/Channels',value:'8'},{key:'採樣率/Sample Rate',value:'1000 Hz'},{key:'傳輸/Transmission',value:'Bluetooth 5.0'},{key:'電極/Electrodes',value:'乾式 / Dry'}]),
      image_url:'',
    },
    {
      id:2, slug:'sirius', model_id:'Sirius', cat_slug:'eeg-devices', in_stock:true, show_price:false, price:0, currency:'TWD',
      name_zh:'Sirius — 20 通道無線 EEG 帽', name_en:'Sirius — 20-Channel Wireless EEG Cap',
      description_zh:'免凝膠海綿電極，BCI 研究級，支援兒童（3歲以上）。適合認知研究與臨床評估。',
      description_en:'Gel-free sponge electrodes, BCI research-grade, supports children 3+. Suitable for cognitive research and clinical assessment.',
      specs_json: JSON.stringify([{key:'通道數/Channels',value:'20'},{key:'採樣率/Sample Rate',value:'500 Hz'},{key:'傳輸/Transmission',value:'Wi-Fi'},{key:'電極/Electrodes',value:'海綿 / Sponge'}]),
      image_url:'',
    },
    {
      id:3, slug:'vega', model_id:'Vega', cat_slug:'eeg-devices', in_stock:true, show_price:false, price:0, currency:'TWD',
      name_zh:'Vega — 32 通道無線 EEG 帽', name_en:'Vega — 32-Channel Wireless EEG Cap',
      description_zh:'32 通道高密度無線 EEG，支援 ERP、腦機介面研究。免凝膠設計，快速準備。',
      description_en:'32-channel high-density wireless EEG supporting ERP and BCI research. Gel-free design for quick setup.',
      specs_json: JSON.stringify([{key:'通道數/Channels',value:'32'},{key:'採樣率/Sample Rate',value:'500 Hz'},{key:'傳輸/Transmission',value:'Wi-Fi'},{key:'電極/Electrodes',value:'海綿 / Sponge'}]),
      image_url:'',
    },
    {
      id:4, slug:'gemini', model_id:'Gemini', cat_slug:'eeg-devices', in_stock:true, show_price:false, price:0, currency:'TWD',
      name_zh:'Gemini — 超掃描 EEG', name_en:'Gemini — Hyperscanning EEG',
      description_zh:'EEG / ECG / EMG 可切換，支援多人同步量測，適合社會神經科學與雙人互動研究。',
      description_en:'Switchable EEG/ECG/EMG, supports multi-person synchronous measurement for social neuroscience and dyadic interaction research.',
      specs_json: JSON.stringify([{key:'模式/Mode',value:'EEG / ECG / EMG'},{key:'超掃描/Hyperscanning',value:'✓ 最多 4 人'},{key:'採樣率/Sample Rate',value:'500 Hz'}]),
      image_url:'',
    },
    {
      id:5, slug:'cygnus', model_id:'Cygnus', cat_slug:'software', in_stock:true, show_price:false, price:0, currency:'TWD',
      name_zh:'Cygnus — EEG 資料擷取軟體', name_en:'Cygnus — EEG Data Acquisition Software',
      description_zh:'配合 StEEG 硬體使用的資料擷取與即時顯示軟體，支援 LSL 串流、離線分析匯出。',
      description_en:'Data acquisition and real-time display software for StEEG hardware. Supports LSL streaming and offline analysis export.',
      specs_json: JSON.stringify([{key:'平台/Platform',value:'Windows 10/11'},{key:'格式/Format',value:'CSV, EDF, BDF'}]),
      image_url:'',
    },
    {
      id:6, slug:'sigmacog-sub', model_id:'sigmacog', cat_slug:'software', in_stock:true, show_price:false, price:0, currency:'TWD',
      name_zh:'sigmacog — 腦健康報告平台訂閱', name_en:'sigmacog — Brain Health Platform Subscription',
      description_zh:'訂閱制 SaaS 平台。5 分鐘完成臨床級 EEG 腦健康評估，AI 生成個人化報告，雲端儀表板管理。',
      description_en:'Subscription SaaS platform. Clinical-grade EEG brain health assessment in 5 minutes, AI-generated personalized reports, cloud dashboard.',
      specs_json: JSON.stringify([{key:'評估指標',value:'7 項 EEG 認知指標'},{key:'常模',value:'全年齡層'},{key:'部署',value:'雲端 SaaS'}]),
      image_url:'',
    },
  ];

  let allProducts = STATIC_PRODUCTS;
  let allCategories = STATIC_CATEGORIES;
  let activeCat = '';

  // Check for ?slug= param to show product detail
  const urlParams = new URLSearchParams(window.location.search);
  const slugParam = urlParams.get('slug');

  function init() {
    renderTabs();
    renderGrid();
    if (slugParam) openProductBySlug(slugParam);
  }

  function renderTabs() {
    const tabs = document.getElementById('cat-tabs');
    const catMap = {
      'eeg-devices': t('cat_eeg'),
      'software': t('cat_software'),
      'caps': t('cat_caps'),
      'electrodes': t('cat_electrodes'),
      'cables': t('cat_cables'),
      'accessories': t('cat_accessories'),
    };
    // Add a tab for each category that has products
    const usedSlugs = new Set(allProducts.map(p => p.cat_slug));
    let html = `<button class="cat-tab ${!activeCat ? 'active' : ''}" data-cat="">${t('cat_all')}</button>`;
    allCategories.filter(c => usedSlugs.has(c.slug)).forEach(c => {
      const label = getLang() === 'zh' ? c.name_zh : c.name_en;
      html += `<button class="cat-tab ${activeCat === c.slug ? 'active' : ''}" data-cat="${c.slug}">${label}</button>`;
    });
    tabs.innerHTML = html;
    tabs.querySelectorAll('.cat-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCat = btn.dataset.cat;
        tabs.querySelectorAll('.cat-tab').forEach(b => b.classList.toggle('active', b === btn));
        renderGrid();
      });
    });
  }

  function renderGrid() {
    const grid = document.getElementById('product-grid');
    const filtered = activeCat ? allProducts.filter(p => p.cat_slug === activeCat) : allProducts;
    if (!filtered.length) { grid.innerHTML = '<p class="empty-msg">—</p>'; return; }
    grid.innerHTML = filtered.map(p => productCard(p)).join('');
    grid.querySelectorAll('.btn-add-cart').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = JSON.parse(btn.dataset.product);
        CART.add({
          product_id: p.id,
          product_name: p.name_zh + ' / ' + p.name_en,
          name_zh: p.name_zh,
          name_en: p.name_en,
          price: p.price,
          currency: p.currency,
          image_url: p.image_url,
        });
        APP.showToast(t('toast_added'), 'success');
      });
    });
    grid.querySelectorAll('.btn-detail').forEach(btn => {
      btn.addEventListener('click', () => {
        const slug = btn.dataset.slug;
        openProductBySlug(slug);
        history.pushState({}, '', 'products.html?slug=' + slug);
      });
    });
  }

  function productCard(p) {
    const lang = getLang();
    const name = lang === 'zh' ? p.name_zh : p.name_en;
    const desc = (lang === 'zh' ? p.description_zh : p.description_en) || '';
    const priceHtml = p.show_price
      ? `<span class="product-price">${p.currency} ${p.price.toLocaleString()}</span>`
      : `<span class="product-price contact">${t('contact_agent')}</span>`;
    const cartBtn = p.in_stock
      ? `<button class="btn btn-sm btn-add-cart" data-product='${JSON.stringify(p).replace(/'/g, "&#39;")}'>${t('add_cart')}</button>`
      : `<button class="btn btn-sm" disabled>${t('out_of_stock')}</button>`;
    return `
      <div class="product-card">
        <div class="product-img-wrap btn-detail" data-slug="${p.slug}" style="cursor:pointer">
          <img src="${p.image_url || 'images/placeholder.png'}" alt="${name}" loading="lazy">
        </div>
        <div class="product-card-body">
          <div class="product-model">${p.model_id || ''}</div>
          <h3 class="product-name">
            <button class="link-btn btn-detail" data-slug="${p.slug}">${name}</button>
          </h3>
          <p class="product-desc">${desc.slice(0, 80)}${desc.length > 80 ? '…' : ''}</p>
          <div class="product-footer">
            ${priceHtml}
            <div class="product-btns">
              ${cartBtn}
            </div>
          </div>
        </div>
      </div>`;
  }

  function openProductBySlug(slug) {
    const modal = document.getElementById('product-modal');
    const content = document.getElementById('modal-content');
    modal.style.display = 'flex';
    const p = allProducts.find(x => x.slug === slug);
    if (!p) { content.innerHTML = '<p class="error-msg">—</p>'; return; }
    const lang = getLang();
    const name = lang === 'zh' ? p.name_zh : p.name_en;
    const desc = (lang === 'zh' ? p.description_zh : p.description_en) || '';
    let specs = [];
    try { specs = JSON.parse(p.specs_json || '[]'); } catch {}
    const specsHtml = specs.length ? `
      <div class="specs-section">
        <h4>${t('specs')}</h4>
        <table class="specs-table">
          ${specs.map(s => `<tr><th>${s.key || s[0] || ''}</th><td>${s.value || s[1] || ''}</td></tr>`).join('')}
        </table>
      </div>` : '';
    const priceHtml = p.show_price
      ? `<span class="product-price lg">${p.currency} ${p.price.toLocaleString()}</span>`
      : `<span class="product-price contact lg">${t('contact_agent')}</span>`;
    const cartBtn = p.in_stock
      ? `<button class="btn btn-primary btn-add-cart" id="modal-add-cart" data-product='${JSON.stringify(p).replace(/'/g, "&#39;")}'>${t('add_cart')}</button>`
      : `<button class="btn btn-primary" disabled>${t('out_of_stock')}</button>`;

    content.innerHTML = `
      <div class="modal-product">
        <div class="modal-product-img">
          <img src="${p.image_url || 'images/placeholder.png'}" alt="${name}">
        </div>
        <div class="modal-product-info">
          <div class="product-model">${p.model_id || ''}</div>
          <h2 class="modal-product-name">${name}</h2>
          <p class="modal-product-desc">${desc}</p>
          ${specsHtml}
          <div class="modal-product-footer">
            ${priceHtml}
            ${cartBtn}
          </div>
        </div>
      </div>`;
    document.getElementById('modal-add-cart')?.addEventListener('click', function () {
      const prod = JSON.parse(this.dataset.product);
      CART.add({
        product_id: prod.id,
        product_name: prod.name_zh + ' / ' + prod.name_en,
        name_zh: prod.name_zh,
        name_en: prod.name_en,
        price: prod.price,
        currency: prod.currency,
        image_url: prod.image_url,
      });
      APP.showToast(t('toast_added'), 'success');
    });
  }

  function closeModal() {
    document.getElementById('product-modal').style.display = 'none';
    history.pushState({}, '', 'products.html');
  }

  document.addEventListener('DOMContentLoaded', () => {
    init();
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('product-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
  });
})();
</script>
</body>
</html>
