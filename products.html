  // Check for ?slug= param to show product detail

  const slugParam = urlParams.get('slug');

  function init() {
    renderTabs();
    renderGrid();
    if (slugParam) openProductBySlug(slugParam);
  }

  function renderTabs() {
    const tabs = document.getElementById('cat-tabs');
    const catMap = {
      'eeg-devices': t('cat_eeg'),
      'software': t('cat_software'),
      'caps': t('cat_caps'),
      'electrodes': t('cat_electrodes'),
      'cables': t('cat_cables'),
      'accessories': t('cat_accessories'),
    };
    // Add a tab for each category that has products
    const usedSlugs = new Set(allProducts.map(p => p.cat_slug));
    let html = `<button class="cat-tab ${!activeCat ? 'active' : ''}" data-cat="">${t('cat_all')}</button>`;
    allCategories.filter(c => usedSlugs.has(c.slug)).forEach(c => {
      const label = getLang() === 'zh' ? c.name_zh : c.name_en;
      html += `<button class="cat-tab ${activeCat === c.slug ? 'active' : ''}" data-cat="${c.slug}">${label}</button>`;
    });
    tabs.innerHTML = html;
    tabs.querySelectorAll('.cat-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCat = btn.dataset.cat;
        tabs.querySelectorAll('.cat-tab').forEach(b => b.classList.toggle('active', b === btn));
        renderGrid();
      });
    });
  }

  function renderGrid() {
    const grid = document.getElementById('product-grid');
    const filtered = activeCat ? allProducts.filter(p => p.cat_slug === activeCat) : allProducts;
    if (!filtered.length) { grid.innerHTML = '<p class="empty-msg">—</p>'; return; }
    grid.innerHTML = filtered.map(p => productCard(p)).join('');
    grid.querySelectorAll('.btn-add-cart').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = JSON.parse(btn.dataset.product);
        CART.add({
          product_id: p.id,
          product_name: p.name_zh + ' / ' + p.name_en,
          name_zh: p.name_zh,
          name_en: p.name_en,
          price: p.price,
          currency: p.currency,
          image_url: p.image_url,
        });
        APP.showToast(t('toast_added'), 'success');
      });
    });
    grid.querySelectorAll('.btn-detail').forEach(btn => {
      btn.addEventListener('click', () => {
        const slug = btn.dataset.slug;
        openProductBySlug(slug);
        history.pushState({}, '', 'products.html?slug=' + slug);
      });
    });
  }

  function productCard(p) {
    const lang = getLang();
    const name = lang === 'zh' ? p.name_zh : p.name_en;
    const desc = (lang === 'zh' ? p.description_zh : p.description_en) || '';
    const priceHtml = p.show_price
      ? `<span class="product-price">${p.currency} ${p.price.toLocaleString()}</span>`
      : `<span class="product-price contact">${t('contact_agent')}</span>`;
    const cartBtn = p.in_stock
      ? `<button class="btn btn-sm btn-add-cart" data-product='${JSON.stringify(p).replace(/'/g, "&#39;")}'>${t('add_cart')}</button>`
      : `<button class="btn btn-sm" disabled>${t('out_of_stock')}</button>`;
    return `
      <div class="product-card">
        <div class="product-img-wrap btn-detail" data-slug="${p.slug}" style="cursor:pointer">
          <img src="${p.image_url || 'images/placeholder.png'}" alt="${name}" loading="lazy">
        </div>
        <div class="product-card-body">
          <div class="product-model">${p.model_id || ''}</div>
          <h3 class="product-name">
            <button class="link-btn btn-detail" data-slug="${p.slug}">${name}</button>
          </h3>
          <p class="product-desc">${desc.slice(0, 80)}${desc.length > 80 ? '…' : ''}</p>
          <div class="product-footer">
            ${priceHtml}
            <div class="product-btns">
              ${cartBtn}
            </div>
          </div>
        </div>
      </div>`;
  }

  function openProductBySlug(slug) {
    const modal = document.getElementById('product-modal');
    const content = document.getElementById('modal-content');
    modal.style.display = 'flex';
    const p = allProducts.find(x => x.slug === slug);
    if (!p) { content.innerHTML = '<p class="error-msg">—</p>'; return; }
    const lang = getLang();
    const name = lang === 'zh' ? p.name_zh : p.name_en;
    const desc = (lang === 'zh' ? p.description_zh : p.description_en) || '';
    let specs = [];
    try { specs = JSON.parse(p.specs_json || '[]'); } catch {}
    const specsHtml = specs.length ? `
      <div class="specs-section">
        <h4>${t('specs')}</h4>
        <table class="specs-table">
          ${specs.map(s => `<tr><th>${s.key || s[0] || ''}</th><td>${s.value || s[1] || ''}</td></tr>`).join('')}
        </table>
      </div>` : '';
    const priceHtml = p.show_price
      ? `<span class="product-price lg">${p.currency} ${p.price.toLocaleString()}</span>`
      : `<span class="product-price contact lg">${t('contact_agent')}</span>`;
    const cartBtn = p.in_stock
      ? `<button class="btn btn-primary btn-add-cart" id="modal-add-cart" data-product='${JSON.stringify(p).replace(/'/g, "&#39;")}'>${t('add_cart')}</button>`
      : `<button class="btn btn-primary" disabled>${t('out_of_stock')}</button>`;

    content.innerHTML = `
      <div class="modal-product">
        <div class="modal-product-img">
          <img src="${p.image_url || 'images/placeholder.png'}" alt="${name}">
        </div>
        <div class="modal-product-info">
          <div class="product-model">${p.model_id || ''}</div>
          <h2 class="modal-product-name">${name}</h2>
          <p class="modal-product-desc">${desc}</p>
          ${specsHtml}
          <div class="modal-product-footer">
            ${priceHtml}
            ${cartBtn}
          </div>
        </div>
      </div>`;
    document.getElementById('modal-add-cart')?.addEventListener('click', function () {
      const prod = JSON.parse(this.dataset.product);
      CART.add({
        product_id: prod.id,
        product_name: prod.name_zh + ' / ' + prod.name_en,
        name_zh: prod.name_zh,
        name_en: prod.name_en,
        price: prod.price,
        currency: prod.currency,
        image_url: prod.image_url,
      });
      APP.showToast(t('toast_added'), 'success');
    });
  }

  function closeModal() {
    document.getElementById('product-modal').style.display = 'none';
    history.pushState({}, '', 'products.html');
  }

  document.addEventListener('DOMContentLoaded', () => {
    init();
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('product-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
  });
})();
</script>
</body>
</html>
