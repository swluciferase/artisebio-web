<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StEEG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <span class="brand-steeg">StEEG</span>
      <span class="brand-sub">by Artise Biomedical</span>
    </a>
    <div class="nav-menu" id="nav-menu">
      <a href="/" class="nav-link" data-i18n="nav_home"></a>
      <div id="nav-auth"></div>
      <button id="lang-toggle" class="lang-toggle">EN</button>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" data-i18n="login_title"></button>
      <button class="auth-tab" id="tab-register" data-i18n="register_title"></button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label data-i18n="email"></label>
        <input type="email" id="l-email" class="form-input" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label data-i18n="password"></label>
        <input type="password" id="l-password" class="form-input" autocomplete="current-password" required>
      </div>
      <p class="form-error" id="login-error" style="display:none" data-i18n="login_error"></p>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="login_btn"></button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="auth-form" style="display:none">
      <div class="form-group">
        <label data-i18n="name"></label>
        <input type="text" id="r-name" class="form-input" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label data-i18n="email"></label>
        <input type="email" id="r-email" class="form-input" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label data-i18n="password"></label>
        <input type="password" id="r-password" class="form-input" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label data-i18n="company"></label>
        <input type="text" id="r-company" class="form-input" autocomplete="organization">
      </div>
      <p class="form-error" id="register-error" style="display:none"></p>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="register_btn"></button>
    </form>
  </div>
</main>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
(function () {
  'use strict';

  // Redirect if already logged in
  if (API.token()) { window.location.href = '/'; }

  function switchTab(active) {
    document.getElementById('tab-login').classList.toggle('active', active === 'login');
    document.getElementById('tab-register').classList.toggle('active', active === 'register');
    document.getElementById('login-form').style.display = active === 'login' ? '' : 'none';
    document.getElementById('register-form').style.display = active === 'register' ? '' : 'none';
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('tab-login').addEventListener('click', () => switchTab('login'));
    document.getElementById('tab-register').addEventListener('click', () => switchTab('register'));

    // Check ?mode=register
    if (new URLSearchParams(window.location.search).get('mode') === 'register') {
      switchTab('register');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      try {
        const data = await API.post('/auth/login', {
          email: document.getElementById('l-email').value,
          password: document.getElementById('l-password').value,
        });
        APP.setUser(data.user, data.token);
        const next = new URLSearchParams(window.location.search).get('next') || '/';
        window.location.href = next;
      } catch {
        errEl.style.display = '';
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('register-error');
      errEl.style.display = 'none';
      try {
        const data = await API.post('/auth/register', {
          name: document.getElementById('r-name').value,
          email: document.getElementById('r-email').value,
          password: document.getElementById('r-password').value,
          company: document.getElementById('r-company').value,
        });
        APP.setUser(data.user, data.token);
        window.location.href = '/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = '';
      }
    });
  });
})();
</script>
</body>
</html>
